services:
  # ============================================
  # PHP 8.3 + Apache
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arors_app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
    networks:
      - arors_network

  # ============================================
  # MySQL 8.0
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: arors_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: regrsck_arors_v3
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arors_network

  # ============================================
  # Vite Dev Server (HMR)
  # ============================================
  vite:
    image: node:20-alpine
    container_name: arors_vite
    restart: unless-stopped
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
    command: sh -c "npm install && npm run dev"
    networks:
      - arors_network

networks:
  arors_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
